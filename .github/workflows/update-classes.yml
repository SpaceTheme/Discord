name: Update Classes

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  classUpdate:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{steps.update.outputs.changed}}

    steps:
      - uses: actions/checkout@v4
      
      - id: update
        uses: metro420yt/class-update@v1
        with:
          folder: src
          ext: css

      - uses: EndBug/add-and-commit@v9
        id: commit
        if: ${{steps.update.outputs.totalChanges > 0}}
        with:
          default_author: github_actions
          message: "chore: update classes"
          fetch: true